services:
  mysql:
    image: mysql:8.4
    container_name: it-hub-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    image: node:24-alpine
    container_name: it-hub-api
    profiles: [ "dev" ]
    working_dir: /app
    volumes:
      - ./:/app
      - api_node_modules:/app/apps/api/node_modules
      - root_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - corepack enable && pnpm install --force --no-frozen-lockfile && pnpm --filter api exec prisma generate && pnpm --filter api dev
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://it_hub:secret@mysql:3306/it_hub
      API_PORT: ${API_PORT:-3006}
    ports:
      - "${API_PORT:-3006}:${API_PORT:-3006}"
    depends_on:
      - mysql

  web:
    image: node:24-alpine
    container_name: it-hub-web
    profiles: [ "dev" ]
    working_dir: /app
    volumes:
      - ./:/app
      - web_node_modules:/app/apps/web/node_modules
      - root_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - corepack enable && pnpm install --force --no-frozen-lockfile && pnpm --filter web dev --host 0.0.0.0
    environment:
      NODE_ENV: development
      WEB_PORT: ${WEB_PORT:-5176}
    ports:
      - "${WEB_PORT:-5176}:${WEB_PORT:-5176}"
    depends_on:
      - api

volumes:
  mysql_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:

services:
  mysql:
    image: mysql:8.4
    container_name: it-hub-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    image: node:24-alpine
    container_name: it-hub-api
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - ./:/app
      - api_node_modules:/app/apps/api/node_modules
      - root_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - corepack enable && pnpm install --force --no-frozen-lockfile && pnpm --filter api dev
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${API_PORT:-3001}
    ports:
      - "3001:3001"
    depends_on:
      - mysql

  web:
    image: node:24-alpine
    container_name: it-hub-web
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - ./:/app
      - web_node_modules:/app/apps/web/node_modules
      - root_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - corepack enable && pnpm install --force --no-frozen-lockfile && pnpm --filter web dev --host 0.0.0.0
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mysql_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
